camera:
  count: 6
  device_paths:
  - /dev/video0
  - /dev/video1
  - /dev/video2
  - /dev/video3
  - /dev/video4
  - /dev/video5
#  resolution:
#    height: 1080
#    width: 1920
  fov_deg: 112
  resolution:
    height: 1080
    width: 1920
camera_layout:
  cam0:
    angle_end: 60
    angle_start: 300
    position: 0
  cam1:
    angle_end: 90
    angle_start: 30
    position: 1
  cam2:
    angle_end: 150
    angle_start: 90
    position: 2
  cam3:
    angle_end: 210
    angle_start: 150
    position: 3
  cam4:
    angle_end: 270
    angle_start: 210
    position: 4
  cam5:
    angle_end: 330
    angle_start: 270
    position: 5
debug:
  print_fps: true
  save_frames: false
  show_blend_regions: true
  show_crop_lines: false
  show_individual_cameras: false
display:
  fullscreen: false
  resolution:
    height: 1080
    width: 1920
  window_name: 360_panorama
performance:
  frame_skip: 0
  processing_scale: 0.5
  resize_for_processing: true
  thread_count: 6
  use_gpu_mat: true
  use_threading: true
stitching:
  desired_view_angle: 60 # 카메라당 시야각 (중앙 기준)
  horizon_line:
    y_ratio: 0.5
